# fly.toml app configuration for GPX Day Planner
# Run `fly launch` to create the app, then `fly deploy`.
# Update `app` below to your chosen app name after `fly launch`.

app = "gpxdayplanner"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[[mounts]]
  source = "gpxdayplanner_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
